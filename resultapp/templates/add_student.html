{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container">
    <h2 class="mb-4"><i class="fas fa-user-plus"></i>Add Student</h2>

    {% if messages %}

    {% for m in messages %}

    <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{m.tags}}{% endif %} alert-dismissible fade show" role="alert">
        {{m}}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    {% endfor %}
    {% endif %}

    <form action="" method="post">
        {% csrf_token %} 
        <div class="mb-3">
            <label for="fullname" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullname" name="fullname" placeholder="e.g., John Doe" required>
        </div>
        <div class="mb-3">
            <label for="indexnumber" class="form-label">Index Number</label>
            <input type="text" class="form-control" id="indexnumber" name="indexnumber" placeholder="e.g., 123456" required maxlength="6">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="e.g., john.doe@example.com" required>
        </div>
        <div class="mb-3">
            <label for="gender" class="form-label">Gender</label>
            <select class="form-control" id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="class" class="form-label">Select Class</label>
            <select class="form-select" id="class" name="class" required>
            <option value="">-- Select Class --</option>

                {% for c in classes %}

                <option value="{{ c.id }}">{{ c.class_name }} - Section {{ c.class_numeric }}</option>

                {% endfor %}

            </select>
        </div>
        <div class="mb-3">
            <label for="dob" class="form-label">Date of Birth</label>
            <input type="date" class="form-control" id="dob" name="dob" placeholder="e.g., 1990-01-01" required>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check me-1"></i>Submit
        </button>
    </form>
</div>

{% endblock %}
