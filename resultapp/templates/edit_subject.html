{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container">
    <h2 class="mb-4"><i class="fas fa-edit"></i>Edit Subject</h2>

    {% if messages %}

    {% for m in messages %}

    <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{m.tags}}{% endif %} alert-dismissible fade show" role="alert">
        {{m}}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    {% endfor %}

    {% endif %}

    <form action="" method="post">
        {% csrf_token %} 
        <div class="mb-3">
            <label for="subjectname" class="form-label">Edit subject Name</label>
            <input type="text" class="form-control" id="subjectname" name="subjectname" placeholder="e.g., English, Maths, Science" value="{{ subject_object.subject_name }}" required>
        </div>
        <div class="mb-3">
            <label for="subjectcode" class="form-label">Edit Subject Code</label>
            <input type="text" class="form-control" id="subjectcode" name="subjectcode" placeholder="e.g., MTH01" value="{{subject_object.subject_code}}" required>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check me-1"></i>Submit
        </button>
    </form>
</div>

{% endblock %}
