{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container">
    <h2 class="mb-4"><i class="fas fa-edit"></i>Edit Student</h2>

    {% if messages %}

    {% for m in messages %}

    <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{m.tags}}{% endif %} alert-dismissible fade show" role="alert">
        {{m}}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    {% endfor %}

    {% endif %}

    <form action="" method="post">
        {% csrf_token %} 
        <div class="mb-3">
            <label for="name" class="form-label">Edit Student Full Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="e.g., John Doe" value="{{ student_object.name }}" required>
        </div>
        <div class="mb-3">
            <label for="indexnumber" class="form-label">Edit Student ID</label>
            <input type="text" class="form-control" id="indexnumber" name="id" placeholder="e.g., 123456" value="{{student_object.id}}" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Edit Student Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="e.g., johndoe@example.com" value="{{student_object.email}}" required>
        </div>
        <div class="mb-3">
            <label for="gender" class="form-label">Edit Student Gender</label>
            <select class="form-control" id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male" {% if student_object.gender == "Male" %}selected{% endif %}>Male</option>
                <option value="Female" {% if student_object.gender == "Female" %}selected{% endif %}>Female</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="class" class="form-label">Select Class</label>
            <select class="form-select" id="class" name="class" required>
            <option value="">-- Select Class --</option>

                {% for c in classes %}
                <option value="{{ c.id }}" {% if student_object.student_class.id == c.id %}selected{% endif %}>
                    {{ c.class_name }} - Section {{ c.class_numeric }}
                </option>

                {% endfor %}

            </select>
        </div>
        <div class="mb-3">
            <label for="dob" class="form-label">Date of Birth</label>
            <input type="date" class="form-control" id="dob" name="dob" placeholder="e.g., 1990-01-01" value="{{ student_object.dob }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label d-block">Student Status</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="status" id="statusActive" value="1" 
                       {% if student_object.status == 1 %}checked{% endif %} required>
                <label class="form-check-label" for="statusActive">Active</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="status" id="statusInactive" value="0" 
                       {% if student_object.status == 0 %}checked{% endif %} required>
                <label class="form-check-label" for="statusInactive">Inactive</label>
            </div>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check me-1"></i>Submit
        </button>
    </form>
</div>

{% endblock %}
