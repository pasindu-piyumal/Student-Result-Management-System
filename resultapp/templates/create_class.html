{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container">
    <h2 class="mb-4"><i class="fas fa-plus-circle"></i>Create Student Class</h2>

    {% if messages %}

    {% for m in messages %}

    <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{m.tags}}{% endif %} alert-dismissible fade show" role="alert">
        {{m}}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    {% endfor %}

    {% endif %}

    <form action="" method="post">
        {% csrf_token %} 
        <div class="mb-3">
            <label for="classname" class="form-label">Class Name</label>
            <input type="text" class="form-control" id="classname" name="classname" placeholder="e.g., First , Second , Sixth" required>
        </div>
        <div class="mb-3">
            <label for="classnamenumeric" class="form-label">Class Name in Numeric</label>
            <input type="text" class="form-control" id="classnamenumeric" name="classnamenumeric" placeholder="e.g., 1 , 2 , 6" required>
        </div>
        <div class="mb-3">
            <label for="section" class="form-label">Section</label>
            <input type="text" class="form-control" id="section" name="section" placeholder="e.g., A , B , C" required>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check me-1"></i>Submit
        </button>
    </form>
</div>

{% endblock %}
